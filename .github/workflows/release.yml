name: Release

on:
  push:
    tags:
      - "v*.*.*"
      - "v*.*.*-dryrun"

jobs:
  create-release:
    name: Create GitHub Release
    if: ${{ startsWith(github.ref, 'refs/tags/v') }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
  publish-crate:
    name: Publish to crates.io
    runs-on: ubuntu-latest
    if: ${{ startsWith(github.ref, 'refs/tags/v') }}
    needs: create-release
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - name: Cargo login
        if: ${{ !endsWith(github.ref, '-dryrun') }}
        run: echo "${{ secrets.CRATES_IO_TOKEN }}" | cargo login
      - name: Cargo publish moju-derive-macros (dry run)
        if: ${{ endsWith(github.ref, '-dryrun') }}
        run: cargo publish -p moju-derive-macros --dry-run
      - name: Cargo publish moju-derive-macros
        if: ${{ !endsWith(github.ref, '-dryrun') }}
        run: cargo publish -p moju-derive-macros
      - name: Cargo publish moju-derive (dry run)
        if: ${{ endsWith(github.ref, '-dryrun') }}
        run: cargo publish -p moju-derive --dry-run
      - name: Cargo publish moju-derive
        if: ${{ !endsWith(github.ref, '-dryrun') }}
        run: cargo publish -p moju-derive
